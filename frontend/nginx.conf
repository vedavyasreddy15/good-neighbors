server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # React router — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to Railway backend
    location /api/ {
        resolver 1.1.1.1 valid=30s;
        set $backend "https://good-neighbors-production.up.railway.app";
        proxy_pass $backend;
        proxy_set_header Host good-neighbors-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
}
